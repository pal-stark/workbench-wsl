services:
portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    command: -H unix:///var/run/docker.sock
    ports:
        - "9000:9000"
        - "9443:9443"
    volumes:
        - /var/run/docker.sock:/var/run/docker.sock
        - ./portainer/data:/data